name: Real CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Verify Node Installation
        run: node -v

      - name: Install Dependencies
        run: npm install

      - name: Run Application
        run: npm start

      - name: Run Tests
        run: npm test
